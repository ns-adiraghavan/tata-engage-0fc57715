<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <defs>
    <radialGradient id="outerGrad_ambassador" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#6BAAEC"/>
      <stop offset="45%" stop-color="#3B82C4"/>
      <stop offset="100%" stop-color="#1A5A9A"/>
    </radialGradient>
    <radialGradient id="innerGrad_ambassador" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#DCEEFF"/>
      <stop offset="55%" stop-color="#90C8F5"/>
      <stop offset="100%" stop-color="#3B82C4"/>
    </radialGradient>
    <radialGradient id="centerGrad_ambassador" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="65%" stop-color="#F5F2EE"/>
      <stop offset="100%" stop-color="#E8E2D8"/>
    </radialGradient>
    <linearGradient id="ribbonGrad_ambassador" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2585e6"/>
      <stop offset="100%" stop-color="#134577"/>
