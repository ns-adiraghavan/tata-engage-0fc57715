    <ellipse cx="35" cy="-2" rx="7" ry="4" transform="rotate(15,35,-2)"/>
    <ellipse cx="36" cy="-13" rx="7" ry="4" transform="rotate(0,36,-13)"/>
    <ellipse cx="32" cy="-23" rx="7" ry="4" transform="rotate(-15,32,-23)"/>
