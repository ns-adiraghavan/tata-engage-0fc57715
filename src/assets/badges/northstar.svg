  <circle cx="173.9" cy="130.6" r="12" fill="url(#goldOuter_northstar)" stroke="#C89A00" stroke-width="0.5"/>
  <circle cx="156.6" cy="156.6" r="12" fill="url(#goldOuter_northstar)" stroke="#C89A00" stroke-width="0.5"/>
  <circle cx="130.6" cy="173.9" r="12" fill="url(#goldOuter_northstar)" stroke="#C89A00" stroke-width="0.5"/>
  <circle cx="100.0" cy="180.0" r="12" fill="url(#goldOuter_northstar)" stroke="#C89A00" stroke-width="0.5"/>
  <circle cx="69.4" cy="173.9" r="12" fill="url(#goldOuter_northstar)" stroke="#C89A00" stroke-width="0.5"/>
  <circle cx="43.4" cy="156.6" r="12" fill="url(#goldOuter_northstar)" stroke="#C89A00" stroke-width="0.5"/>
  <circle cx="26.1" cy="130.6" r="12" fill="url(#goldOuter_northstar)" stroke="#C89A00" stroke-width="0.5"/>
  <circle cx="20.0" cy="100.0" r="12" fill="url(#goldOuter_northstar)" stroke="#C89A00" stroke-width="0.5"/>
  <circle cx="26.1" cy="69.4" r="12" fill="url(#goldOuter_northstar)" stroke="#C89A00" stroke-width="0.5"/>
  <circle cx="43.4" cy="43.4" r="12" fill="url(#goldOuter_northstar)" stroke="#C89A00" stroke-width="0.5"/>
  <circle cx="69.4" cy="26.1" r="12" fill="url(#goldOuter_northstar)" stroke="#C89A00" stroke-width="0.5"/>

  <!-- Main circle body -->
