  <circle cx="130.6" cy="26.1" r="12" fill="url(#goldOuter_northstar)" stroke="#C89A00" stroke-width="0.5"/>
  <circle cx="156.6" cy="43.4" r="12" fill="url(#goldOuter_northstar)" stroke="#C89A00" stroke-width="0.5"/>
