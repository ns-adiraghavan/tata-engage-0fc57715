<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <defs>
    <radialGradient id="goldOuter_northstar" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#F5D060"/>
      <stop offset="45%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#A07800"/>
    </radialGradient>
    <radialGradient id="goldInner_northstar" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#FFF8DC"/>
      <stop offset="50%" stop-color="#F0E060"/>
      <stop offset="100%" stop-color="#C89A00"/>
    </radialGradient>
    <radialGradient id="centerGrad_northstar" cx="50%" cy="35%" r="60%">
